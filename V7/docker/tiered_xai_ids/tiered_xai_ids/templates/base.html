<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2b;
      --text: #e6edf7;
      --muted: #9db0d0;
      --accent: #4f8cff;
      --ok: #1da66f;
      --warn: #f4a62a;
      --bad: #ef5350;
      --line: #24314d;
    }
    body {
      margin: 0;
      font-family: Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .title {
      font-size: 22px;
      margin: 0;
    }
    .muted {
      color: var(--muted);
      font-size: 13px;
    }
    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .nav a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      background: #0f1728;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 14px;
      margin-bottom: 14px;
    }
    .chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--line);
      margin-right: 8px;
    }
    .ok { color: #88e4b7; border-color: #226f52; }
    .warn { color: #ffd08a; border-color: #7f5922; }
    .bad { color: #ff9f9f; border-color: #7f2a2a; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 600; }
    code {
      color: #b8cdfa;
      font-size: 12px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">{{ title }}</h1>
        <div class="muted">{{ subtitle }}</div>
      </div>
      <div class="nav">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/health">Health</a>
        <a href="/docs">Docs</a>
      </div>
    </div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
