# Runs on AWS VM (VPN IP: 10.8.0.1)
# Services: global-model, brain-node, sensor-node, orchestrator, federated-lab, attack-client
# Local machine (VPN IP: 10.8.0.2) runs: filter-node (8102), ids-node-a (8001), ids-node-b (8002)
#                                          panel-app (8200), vehicle-client (5000), simulator (9000)

services:
  global-model:
    build:
      context: ./tiered_xai_ids
      dockerfile: Dockerfile
    command: uvicorn run_global_model:app --host 0.0.0.0 --port 8104
    env_file:
      - ./tiered_xai_ids/.env
    environment:
      GLOBAL_OLLAMA_BASE_URL: http://host.docker.internal:11434
      GLOBAL_SENSOR_NODE_URL: http://sensor-node:8101
      GLOBAL_FILTER_NODE_URL: http://10.8.0.2:8102
      GLOBAL_BRAIN_NODE_URL: http://brain-node:8103
      GLOBAL_IDS_A_URL: http://10.8.0.2:8001
      GLOBAL_IDS_B_URL: http://10.8.0.2:8002
    ports:
      - "8104:8104"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8104/health', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 4
    restart: unless-stopped
    networks:
      - cloud-network

  brain-node:
    build:
      context: ./tiered_xai_ids
      dockerfile: Dockerfile
    command: uvicorn run_brain:app --host 0.0.0.0 --port 8103
    env_file:
      - ./tiered_xai_ids/.env
    environment:
      BRAIN_OLLAMA_BASE_URL: http://host.docker.internal:11434
      BRAIN_GLOBAL_MODEL_URL: http://global-model:8104
      REQUEST_TIMEOUT_SECONDS: "60"
      MAX_MODEL_RETRIES: "1"
    ports:
      - "8103:8103"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8103/health', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 4
    depends_on:
      global-model:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cloud-network

  sensor-node:
    build:
      context: ./tiered_xai_ids
      dockerfile: Dockerfile
    command: uvicorn run_sensor:app --host 0.0.0.0 --port 8101
    env_file:
      - ./tiered_xai_ids/.env
    environment:
      SENSOR_FILTER_NODE_URL: http://10.8.0.2:8102
      SENSOR_OLLAMA_BASE_URL: http://host.docker.internal:11434
      SENSOR_GLOBAL_MODEL_URL: http://global-model:8104
      REQUEST_TIMEOUT_SECONDS: "20"
      MAX_MODEL_RETRIES: "1"
    ports:
      - "8101:8101"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 4
    depends_on:
      global-model:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cloud-network

  orchestrator:
    build:
      context: ./tiered_xai_ids
      dockerfile: Dockerfile
    command: uvicorn run_orchestrator:app --host 0.0.0.0 --port 8100
    env_file:
      - ./tiered_xai_ids/.env
    environment:
      ORCH_SENSOR_NODE_URL: http://sensor-node:8101
      ORCH_FILTER_NODE_URL: http://10.8.0.2:8102
      ORCH_BRAIN_NODE_URL: http://brain-node:8103
      ORCH_GLOBAL_MODEL_URL: http://global-model:8104
      ORCH_IDS_A_URL: http://10.8.0.2:8001
      ORCH_IDS_B_URL: http://10.8.0.2:8002
      ORCH_ALLOWED_ORIGINS: "*"
      REQUEST_TIMEOUT_SECONDS: "30"
    ports:
      - "8100:8100"
    depends_on:
      sensor-node:
        condition: service_healthy
      brain-node:
        condition: service_healthy
      global-model:
        condition: service_healthy
    healthcheck:
      # Accept both "ok" and "degraded" — local nodes may not be up yet
      test: ["CMD", "python", "-c", "import urllib.request, json; r=urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=15); d=json.loads(r.read()); exit(0 if d.get('status') in ('ok','degraded') else 1)"]
      interval: 20s
      timeout: 20s
      retries: 6
    restart: unless-stopped
    networks:
      - cloud-network

  federated-lab:
    build:
      context: ./tiered_xai_ids
      dockerfile: Dockerfile
    command: uvicorn run_federated_lab:app --host 0.0.0.0 --port 8300
    env_file:
      - ./tiered_xai_ids/.env
    environment:
      FEDLAB_GLOBAL_MODEL_URL: http://global-model:8104
      FEDLAB_ORCHESTRATOR_URL: http://orchestrator:8100
    ports:
      - "8300:8300"
    depends_on:
      orchestrator:
        condition: service_healthy
      global-model:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8300/health', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 4
    restart: unless-stopped
    networks:
      - cloud-network

  attack-client:
    build:
      context: .
      dockerfile: Dockerfile.attack
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8100
      IDS_A_URL: http://orchestrator:8100
      IDS_B_URL: http://orchestrator:8100
      IDS_A_DIRECT_URL: http://10.8.0.2:8001
      IDS_B_DIRECT_URL: http://10.8.0.2:8002
      MASTER_COORDINATOR_URL: http://orchestrator:8100
      GLOBAL_MODEL_URL: http://global-model:8104
      ATTACK_CLIENT_PORT: 7000
      ATTACK_DOCKER_CONTROL_ENABLED: "true"
      FLASK_ENV: ${FLASK_ENV:-development}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7700:7000"
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://127.0.0.1:7000/api/health', timeout=5)"]
      interval: 20s
      timeout: 6s
      retries: 4
    restart: unless-stopped
    networks:
      - cloud-network

networks:
  cloud-network:
    driver: bridge
